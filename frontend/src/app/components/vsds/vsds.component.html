<div class="vsds-shell">
  <!-- Breadcrumb: full-width bar below navbar, only when a subsection is active -->
  @if (hasSubsection) {
    <div class="breadcrumb-bar">
      <p-breadcrumb [model]="breadcrumbItems" [home]="home" />
    </div>
  }

  <div class="vsds-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-inner">
        <nav class="sidebar-nav">
          @if (authService.user?.isadmin) {
            <a class="nav-link"
               routerLink="/vsds/folders"
               routerLinkActive="active">
              <i class="pi pi-folder"></i> Folders
            </a>
          }
        </nav>
      </div>
    </aside>

    <!-- Main content area -->
    <main class="vsds-content">
      <router-outlet />
    </main>
  </div>
</div>
