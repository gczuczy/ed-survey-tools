<p-toolbar styleClass="navbar-toolbar">
  <!-- Left: Brand + nav links -->
  <ng-template #start>
    <a class="brand" routerLink="/">ED Survey Tools</a>

    <nav class="nav-links">
      <!-- VSDS (public, leftmost) -->
      <span class="nav-section">
        <a class="nav-link section-name" routerLink="/vsds"
           [class.active]="isVsdsActive">VSDS</a>
        <span class="section-chevron" [class.active]="isVsdsActive"
              (click)="vsdsMenu.toggle($event)">
          <i class="pi pi-chevron-down" style="font-size: 0.7rem"></i>
        </span>
      </span>
      <p-menu #vsdsMenu [model]="vsdsMenuItems" [popup]="true" />

      <!-- Admin (owner-only) -->
      @if (authService.user?.isowner) {
        <span class="nav-section">
          <a class="nav-link section-name" routerLink="/admin"
             [class.active]="isAdminActive">Admin</a>
          <span class="section-chevron" [class.active]="isAdminActive"
                (click)="adminMenu.toggle($event)">
            <i class="pi pi-chevron-down" style="font-size: 0.7rem"></i>
          </span>
        </span>
        <p-menu #adminMenu [model]="adminMenuItems" [popup]="true" />
      }
    </nav>
  </ng-template>

  <!-- Right: User / Login -->
  <ng-template #end>
    @if (authService.isLoggedIn) {
      <p-button [text]="true" [plain]="true"
                (onClick)="userMenu.toggle($event)">
        <i class="pi pi-user"></i>
        &nbsp;CMDR {{ authService.user?.name }}
        <i class="pi pi-chevron-down"
           style="font-size: 0.7rem; margin-left: 0.3rem"></i>
      </p-button>
      <p-menu #userMenu [model]="userMenuItems" [popup]="true" />
    } @else if (authService.isConfigured) {
      <p-button label="Login" (onClick)="login()" size="small" />
    } @else {
      <span class="nav-link warn-link"
            title="Authentication service unavailable">
        <i class="pi pi-exclamation-triangle"></i> Auth Unavailable
      </span>
    }
  </ng-template>
</p-toolbar>

@if (hasBreadcrumb) {
  <div class="breadcrumb-bar">
    <p-breadcrumb [model]="breadcrumbItems" [home]="homeCrumb" />
  </div>
}
